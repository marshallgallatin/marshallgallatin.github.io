# Site settings
title: "CS373 Spring 2016: Marshall Gallatin"
tagline: # Tagline goes here
email: marshallgallatin@gmail.com
description: > # this means to ignore newlines until "baseurl:"
  CS Student at the The University of Texas
baseurl: "" # the subpath of your site, e.g. /blog/
url: "http://marshallgallatin.github.io" # http://localhost:4000 # http://marshallgallatin.github.io
logourl: /assets/images/headshot.jpg # Site logo
author: "Marshall Gallatin"
author_thumbnail: "/assets/images/avatar.jpg" # Author avatar
# Theme customization - please change from the defaults!
theme:
  # Color for sidebar bar, links, etc
  highlight_color: "#BF5700" #205081" # "#272935"
  # Social media links, leave blank to ignore
  social: 
    github: marshallgallatin
    twitter: 
    facebook: 
    gplus: 
    # dribble: 
    pinterest: 

  # Enable share buttons on post footer
  show_share_buttons: true

  # Show author picure, name and social links on post footer
  show_author_info: true

  # Disqus comments manager - shortname
  # disqus_shortname: 

  # Google Analytics/Webmaster key, leave blank to ignore
  google_analytics_key: UA-72773773-1
  google_webmaster_key: 

# Build settings
markdown: kramdown

# Permalinks
permalink: /:title/

# Pagination config
paginate: 5

# Files/Folders to be excluded from generated _site folder
exclude: 
  - CNAME
  - Gemfile
  - Rakefile
  - README.md
  - .gitignore
  - .sass-cache
  - Gemfile.lock

# Sass conversion configs
sass:
  sass_dir: assets/css/_sass
  style: :compressed
  
# enables creating a sitemap.xml file
gems:
  - jekyll-sitemap
